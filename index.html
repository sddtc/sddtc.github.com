		<meta name="generator" content="Eleventy v3.1.6">
		
		
		<noscript><meta http-equiv="refresh" content="0; url=/sddtc.github.com/zh/"></noscript>
		<script>
		; (function () {
			function getStoredLanguage() {
				try {
					return window.localStorage && window.localStorage.getItem
						? window.localStorage.getItem('preferredLanguage')
						: ''
				} catch (error) {
					return ''
				}
			}

			function pickLanguage(storedLanguage, browserLanguages) {
				if (storedLanguage === 'zh' || storedLanguage === 'en') {
					return storedLanguage
				}

				var languages = Array.isArray(browserLanguages) ? browserLanguages : []
				for (var i = 0; i < languages.length; i++) {
					if (String(languages[i]).toLowerCase().indexOf('zh') === 0) {
						return 'zh'
					}
				}
				for (var j = 0; j < languages.length; j++) {
					if (String(languages[j]).toLowerCase().indexOf('en') === 0) {
						return 'en'
					}
				}
				return 'zh'
			}

			var browserLanguages = navigator.languages && navigator.languages.length
				? navigator.languages
				: [navigator.language]
			var language = pickLanguage(getStoredLanguage(), browserLanguages)
			window.location.replace({ zh: '/zh/', en: '/en/' }[language])
		})()
		</script>
